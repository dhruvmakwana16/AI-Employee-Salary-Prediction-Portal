<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body, html {
            height: 100%;
            margin: 0;
            background: #0f172a;
            color: #f1f5f9;
        }

        .dashboard-container {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .dashboard-header {
            padding: 1rem;
            text-align: center;
            background: #1e293b;
            color: #38bdf8;
            font-weight: 600;
            font-size: 1.8rem;
        }

        .dashboard-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        .dashboard-content img {
            width: 95%;   /* make chart nearly full width */
            height: 95%;  /* make chart nearly full height */
            object-fit: contain; /* ensures full chart is visible */
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .dashboard-footer {
            padding: 1rem;
            text-align: center;
            background: #1e293b;
        }

        .dashboard-footer a {
            width: 200px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">

    <div class="dashboard-header">
        Salary Analytics Dashboard
    </div>

    <div class="dashboard-content">
        <img src="{{ chart }}" alt="Salary Chart">
    </div>

    <div class="dashboard-footer">
        <a href="/" class="btn btn-primary">Back</a>
    </div>

</div>

</body>
</html>
